<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Voice Call Dashboard</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
    <h1>AI Voice Call Dashboard</h1>

    <form method="post" action="/call">
        <input type="text" name="phone" placeholder="+9677xxxxxxx" required>
        <button type="submit">اتصل</button>
    </form>

    <div class="call-log">
        <h2>سجل المكالمات</h2>
        <table>
            <tr>
                <th>Call ID</th>
                <th>رقم الهاتف</th>
                <th>الحالة</th>
            </tr>
            {% for call_id, info in calls.items() %}
            <tr>
                <td>{{ call_id }}</td>
                <td>{{ info.to }}</td>
                <td class="status-{{ info.status | lower | replace(' ', '-') }}">{{ info.status }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>
</div>
</body>
</html>
